<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çevir & Belirle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --primary: #4776E6;
            --secondary: #8E54E9;
            --dark: #1e272e;
            --light: #f5f6fa;
            --sidebar-width: 380px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: var(--dark);
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sol Taraf - Çark Alanı */
        .wheel-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            transition: all 0.5s;
        }

        .wheel-wrapper {
            position: relative;
            width: 95%;
            max-width: 750px;
            aspect-ratio: 1/1;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
        }

        canvas#wheelCanvas { width: 100%; height: 100%; border-radius: 50%; }

        .pointer {
            position: absolute; top: 50%; right: -15px; transform: translateY(-50%);
            width: 50px; height: 40px; background: #ff4757;
            clip-path: polygon(100% 0%, 100% 100%, 0% 50%); z-index: 10;
            filter: drop-shadow(-4px 4px 6px rgba(0,0,0,0.3));
        }

        /* Sağ Taraf - Kenar Çubuğu (Öğretmen Paneli) */
        .sidebar {
            width: var(--sidebar-width); background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); padding: 40px 30px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            z-index: 20; border-left: 1px solid rgba(255,255,255,0.5);
        }

        /* ÖĞRENCİ MODUNDA SİDEBAR GİZLENİR */
        body.student-mode .sidebar { display: none !important; }

        h2 { margin-top: 0; font-weight: 800; font-size: 1.8rem; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; text-align: center; }

        .input-group { flex: 1; display: flex; flex-direction: column; margin-bottom: 20px; }
        label { font-weight: 600; margin-bottom: 12px; font-size: 1.1rem; }

        textarea {
            flex: 1; width: 100%; padding: 20px; border: 2px solid #e0e6ed; border-radius: 16px;
            font-family: 'Poppins', sans-serif; font-size: 1.05rem; resize: none; box-sizing: border-box;
            background-color: #f8fafc; line-height: 1.6;
        }
        textarea:focus { outline: none; border-color: var(--primary); background-color: #ffffff; }

        .controls-area { display: flex; flex-direction: column; gap: 15px; }

        button#spinBtn {
            width: 100%; padding: 18px; font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 800;
            color: white; background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none;
            border-radius: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(71, 118, 230, 0.3); transition: 0.3s;
        }
        button#spinBtn:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 25px rgba(71, 118, 230, 0.4); }
        button#spinBtn:disabled { background: #ced6e0; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Paylaş Butonu */
        button#shareBtn {
            width: 100%; padding: 15px; font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 800;
            color: white; background: var(--dark); border: none; border-radius: 16px; cursor: pointer; transition: 0.3s;
        }
        button#shareBtn:hover { background: #2f3640; }

        /* Yalnızca Öğrenci Modunda Görünen Dev Çevir Butonu */
        #studentSpinBtn {
            display: none; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 50px; font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 800;
            color: white; background: linear-gradient(45deg, #10ac84, #1dd1a1); border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(29, 209, 161, 0.4); z-index: 30;
        }
        body.student-mode #studentSpinBtn { display: block; }
        #studentSpinBtn:disabled { background: #ced6e0; cursor: not-allowed; box-shadow: none; }

        /* Paylaşım Modalı */
        #share-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 9999;
            opacity: 0; transition: opacity 0.3s;
        }
        #share-modal.show { display: flex; opacity: 1; }
        .modal-content {
            background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center; max-width: 500px; width: 90%; position: relative;
        }
        .modal-icon { font-size: 3.5rem; color: #4776E6; margin-bottom: 15px; }
        .modal-title { font-size: 1.6rem; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
        .modal-desc { color: #576574; margin-bottom: 25px; font-size: 0.95rem; }

        .link-box { display: flex; align-items: center; background: #f1f2f6; border: 2px solid #dfe4ea; border-radius: 12px; padding: 10px; margin-bottom: 20px; }
        .link-text { flex: 1; font-family: monospace; font-size: 1rem; color: var(--primary); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; padding: 0 10px;}
        
        .copy-btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .copy-btn.copied { background: #10ac84; }

        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #a4b0be; cursor: pointer; background: none; border: none; }

        /* Sonuç Alanı */
        #result-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 50; background: rgba(255,255,255,0); transition: background 0.5s ease;
        }
        #result-overlay.active { background: rgba(255,255,255,0.7); backdrop-filter: blur(5px); pointer-events: auto; }

        .result-box {
            background: white; padding: 50px 70px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center; transform: scale(0) translateY(50px); opacity: 0; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid var(--secondary); max-width: 80%;
        }
        .result-box.show { transform: scale(1) translateY(0); opacity: 1; }
        #selectedItem { font-size: 3.5rem; font-weight: 800; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }

        .close-result { padding: 12px 40px; background: var(--dark); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: 600; font-family: 'Poppins', sans-serif; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column-reverse; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-left: none; border-top: 1px solid rgba(255,255,255,0.5); }
            .wheel-area { height: 60vh; min-height: 400px; }
            textarea { height: 180px; }
        }
    </style>
</head>
<body>

    <audio id="spinSound" src="cark.mp3" loop preload="auto"></audio>
    <audio id="confettiSound" src="konfeti.mp3" preload="auto"></audio>

    <div id="share-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeShareModal()"><i class="fa-solid fa-times"></i></button>
            <i class="fa-solid fa-share-nodes modal-icon"></i>
            <h3 class="modal-title">Çarkınız Hazır!</h3>
            <p class="modal-desc">Veritabanına ihtiyaç duymadan çarkınız linke gömüldü. Bu linki kopyalayıp dilediğiniz yerde paylaşabilirsiniz.</p>
            
            <div class="link-box">
                <div class="link-text" id="shareLinkText">...</div>
                <button class="copy-btn" id="copyBtn" onclick="copyShareLink()">
                    <i class="fa-regular fa-copy"></i> Kopyala
                </button>
            </div>
            
            <a href="#" target="_blank" id="testLinkBtn" style="color: var(--primary); font-weight: bold; text-decoration: none;">Linkin nasıl göründüğünü test et <i class="fa-solid fa-arrow-up-right-from-square ms-1"></i></a>
        </div>
    </div>

    <div class="main-container">
        <div class="wheel-area">
            <div class="wheel-wrapper">
                <canvas id="wheelCanvas" width="1000" height="1000"></canvas>
                <div class="pointer"></div>
            </div>
            <button id="studentSpinBtn" onclick="startSpin()">ÇEVİR!</button>

            <div id="result-overlay">
                 <div class="result-box" id="resultBox">
                    <div id="selectedItem"></div>
                    <button class="close-result" onclick="closeResult()">Tamam</button>
                 </div>
            </div>
        </div>

        <div class="sidebar">
            <h2>Çarkı Hazırla 🎯</h2>
            <div class="input-group">
                <label for="itemInput">Seçenekleri Yazın:</label>
                <textarea id="itemInput" placeholder="Kelime, İsim veya Konu...">Arkadaşlarınla alay etmek
Çevreye çöp atmak
Kırıcı yorum yazmak
Yalan haber yaymak
İzinsiz fotoğraf paylaşmak
İnsanlara zarar vermek</textarea>
            </div>
            
            <div class="controls-area">
                <button id="spinBtn" onclick="startSpin()"><i class="fa-solid fa-rotate me-2"></i> DENEME ÇEVİRİŞİ</button>
                <button id="shareBtn" onclick="openShareModal()"><i class="fa-solid fa-link me-2"></i> LİNKİ KOPYALA VE PAYLAŞ</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const itemInput = document.getElementById("itemInput");
        const spinSound = document.getElementById("spinSound");
        const confettiSound = document.getElementById("confettiSound");

        const colors = ["#FF5252", "#FF4081", "#E040FB", "#7C4DFF", "#536DFE", "#448AFF", "#40C4FF", "#18FFFF", "#64FFDA", "#69F0AE", "#B2FF59", "#EEFF41", "#FFFF00", "#FFD740", "#FFAB40", "#FF6E40"];

        let items = [];
        let currentAngle = 0;
        let isSpinning = false;
        let spinDuration = 5000; 
        let spinStartTime = null;
        let startAngle = 0;
        let targetRotation = 0;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('d');
            
            if (dataParam) {
                document.body.classList.add('student-mode');
                const decodedString = decodeURIComponent(dataParam);
                items = decodedString.split('|');
                drawWheel();
            } else {
                updateItemsFromInput();
            }
        };

        function openShareModal() {
            const cleanItems = itemInput.value.split('\n').filter(item => item.trim() !== '');
            if(cleanItems.length < 2) {
                alert("Paylaşmak için en az 2 seçenek yazmalısınız!"); return;
            }
            const encodedData = encodeURIComponent(cleanItems.join('|'));
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = baseUrl + "?d=" + encodedData;

            document.getElementById("shareLinkText").innerText = shareUrl;
            document.getElementById("testLinkBtn").href = shareUrl;
            document.getElementById("share-modal").classList.add("show");
        }

        function closeShareModal() {
            document.getElementById("share-modal").classList.remove("show");
            const btn = document.getElementById("copyBtn");
            btn.innerHTML = `<i class="fa-regular fa-copy"></i> Kopyala`;
            btn.classList.remove("copied");
        }

        function copyShareLink() {
            const link = document.getElementById("shareLinkText").innerText;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.getElementById("copyBtn");
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Kopyalandı`;
                btn.classList.add("copied");
            });
        }

        function updateItemsFromInput() {
            if(!document.body.classList.contains('student-mode')) {
                items = itemInput.value.split('\n').filter(item => item.trim() !== '');
                document.getElementById("spinBtn").disabled = items.length < 2;
                document.getElementById("shareBtn").disabled = items.length < 2;
                drawWheel();
            }
        }
        itemInput.addEventListener('input', updateItemsFromInput);

        // --- YENİ EKLENEN SİHİRLİ FONKSİYON: METNİ SATIRLARA BÖLME (WORD WRAP) ---
        function wrapText(context, text, maxWidth) {
            let words = text.split(' ');
            let lines = [];
            let currentLine = words[0];

            for (let i = 1; i < words.length; i++) {
                let word = words[i];
                let width = context.measureText(currentLine + " " + word).width;
                if (width < maxWidth) {
                    currentLine += " " + word;
                } else {
                    lines.push(currentLine);
                    currentLine = word;
                }
            }
            lines.push(currentLine);
            return lines;
        }

        function drawWheel() {
            const numItems = items.length;
            if (numItems === 0) return;

            const arc = Math.PI * 2 / numItems;
            const centerX = canvas.width / 2; 
            const centerY = canvas.height / 2;
            const sliceRadius = (canvas.width / 2) - 40;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numItems; i++) {
                const angle = currentAngle + i * arc;
                
                // Dilimi Çiz
                ctx.beginPath(); 
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(centerX, centerY); 
                ctx.arc(centerX, centerY, sliceRadius, angle, angle + arc, false); 
                ctx.lineTo(centerX, centerY); 
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.4)"; 
                ctx.lineWidth = 2; 
                ctx.stroke();

                // Yazıyı Çiz
                ctx.save(); 
                
                // Seçenek sayısına göre dinamik font boyutu ayarı
                let fontSize = 34;
                if (numItems >= 12) fontSize = 20;
                else if (numItems >= 8) fontSize = 26;

                ctx.fillStyle = "#ffffff"; 
                ctx.font = `bold ${fontSize}px 'Poppins', sans-serif`;
                ctx.shadowColor = "rgba(0,0,0,0.6)"; 
                ctx.shadowBlur = 6; 
                ctx.shadowOffsetX = 2; 
                ctx.shadowOffsetY = 2;
                
                // YENİ HİZALAMA MANTIĞI: Ortaya git, açıyı ayarla
                const textAngle = angle + arc / 2;
                ctx.translate(centerX, centerY);
                ctx.rotate(textAngle);
                
                // Yazıyı sağa (dış çerçeveye) dayalı yazacağız
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                
                if(items[i]) {
                    // Merkeze çarpmaması için maksimum genişlik hesabı (Siyah göbek çapı 75, biraz da boşluk bırakıyoruz)
                    const maxTextWidth = sliceRadius - 120; 
                    
                    // Metni satırlara ayır
                    const lines = wrapText(ctx, items[i], maxTextWidth);
                    
                    // Satırları dikeyde ortalamak için hesaplama
                    const lineHeight = fontSize * 1.3;
                    const totalHeight = lines.length * lineHeight;
                    let startY = -(totalHeight / 2) + (lineHeight / 2);
                    
                    // Dış çerçeveden 30px içeriye (sağa dayalı) satır satır bas
                    const textX = sliceRadius - 30;

                    for(let j = 0; j < lines.length; j++) {
                        ctx.fillText(lines[j], textX, startY + (j * lineHeight));
                    }
                }
                ctx.restore();
            }

            // Çerçeve ve Göbek (Aynı kaldı)
            ctx.beginPath(); ctx.arc(centerX, centerY, sliceRadius, 0, Math.PI * 2); ctx.lineWidth = 30; ctx.strokeStyle = "#1e272e"; ctx.stroke();
            ctx.beginPath(); ctx.arc(centerX, centerY, sliceRadius, 0, Math.PI * 2); ctx.lineWidth = 4; ctx.strokeStyle = "#485460"; ctx.stroke();
            const numPegs = numItems * 2;
            for (let i = 0; i < numPegs; i++) {
                const pegAngle = currentAngle + (Math.PI * 2 / numPegs) * i;
                const pegX = centerX + Math.cos(pegAngle) * sliceRadius; const pegY = centerY + Math.sin(pegAngle) * sliceRadius;
                ctx.beginPath(); ctx.arc(pegX, pegY, 8, 0, Math.PI * 2); ctx.fillStyle = "#f1c40f"; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = "#ffffff"; ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(centerX, centerY, 75, 0, Math.PI * 2); ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fill();
            ctx.beginPath(); ctx.arc(centerX, centerY, 70, 0, Math.PI * 2); ctx.fillStyle = "#ffffff"; ctx.fill();
            ctx.beginPath(); ctx.arc(centerX, centerY, 55, 0, Math.PI * 2); ctx.fillStyle = "#1e272e"; ctx.fill();
            ctx.font = "40px 'Poppins'"; ctx.fillStyle = "#f1c40f"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("★", 0, 2); // Rotate merkezde olduğu için 0'a 2
        }

        function easeOutQuart(t, b, c, d) { t /= d; t--; return -c * (t * t * t * t - 1) + b; }

        function animate(currentTime) {
            if (!spinStartTime) spinStartTime = currentTime;
            const elapsed = currentTime - spinStartTime;

            if (elapsed < spinDuration) {
                currentAngle = easeOutQuart(elapsed, startAngle, targetRotation, spinDuration);
                drawWheel();
                requestAnimationFrame(animate);
            } else {
                currentAngle = startAngle + targetRotation;
                drawWheel();
                isSpinning = false;
                document.getElementById("spinBtn").disabled = false;
                document.getElementById("studentSpinBtn").disabled = false;
                spinSound.pause(); spinSound.currentTime = 0;
                showResult();
            }
        }

        function fireConfetti() {
            var end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function showResult() {
            const arc = Math.PI * 2 / items.length;
            const normalizedAngle = currentAngle % (Math.PI * 2);
            let winningIndex = Math.floor(((Math.PI * 2) - normalizedAngle) / arc) % items.length;
            if(winningIndex < 0) winningIndex = items.length - 1;

            document.getElementById("selectedItem").innerHTML = `✨ ${items[winningIndex]} ✨`;
            document.getElementById("resultBox").classList.add('show');
            document.getElementById("result-overlay").classList.add('active');

            confettiSound.currentTime = 0; confettiSound.play().catch(()=>{});
            fireConfetti();
        }

        function closeResult() {
             document.getElementById("resultBox").classList.remove('show');
             document.getElementById("result-overlay").classList.remove('active');
             confettiSound.pause(); confettiSound.currentTime = 0;
        }

        function startSpin() {
            if (isSpinning || items.length < 2) return;
            
            closeResult();
            isSpinning = true;
            document.getElementById("spinBtn").disabled = true;
            document.getElementById("studentSpinBtn").disabled = true;
            
            spinSound.play().catch(()=>{});

            spinStartTime = null;
            startAngle = currentAngle;
            targetRotation = (Math.PI * 2 * 6) + (Math.random() * Math.PI * 2);

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
